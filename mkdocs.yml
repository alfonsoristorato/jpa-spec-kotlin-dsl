site_name: JPA Specification Kotlin DSL
site_url: https://alfonsoristorato.github.io/jpa-spec-kotlin-dsl/
site_description: A Kotlin DSL for building type-safe JPA queries using idiomatic Kotlin syntax.
site_author: Alfonso Ristorato
repo_url: https://github.com/alfonsoristorato/jpa-spec-kotlin-dsl
repo_name: jpa-spec-kotlin-dsl
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - macros

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  release_version: !ENV [RELEASE_VERSION, 'latest']

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: getting-started.md
  - Examples:
      - Basic Operations: examples/basic-operations.md
      - Collection Operations: examples/collection-operations.md
      - Nested Properties: examples/nested-properties.md
      - Joins: examples/joins.md
      - Combining Specifications: examples/combining.md
  - Hibernate Module:
      - Overview: hibernate/index.md
      - Case-insensitive string matching: hibernate/string-operations.md
      - Native array operations: hibernate/array-operations.md
      - Native collection operations: hibernate/collection-operations.md
  - API Reference: https://alfonsoristorato.github.io/jpa-spec-kotlin-dsl/api/
